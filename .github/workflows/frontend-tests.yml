name: Frontend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "leadify-frontend-main/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "leadify-frontend-main/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: leadify-frontend-main

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: leadify-frontend-main/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Run unit tests
        run: npm run test -- --run

      - name: Run tests with coverage
        run: npm run test:coverage -- --run
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          files: leadify-frontend-main/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: leadify-frontend-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: leadify-frontend-main/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]

    defaults:
      run:
        working-directory: leadify-frontend-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: leadify-frontend-main/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.API_BASE_URL }}
