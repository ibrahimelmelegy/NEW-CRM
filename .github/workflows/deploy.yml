name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 10m
          script: /opt/crm/redeploy.sh

      - name: Verify deployment
        if: success()
        run: |
          sleep 10
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://crm.hp-tech.com)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site returned HTTP $STATUS after deploy"
            exit 1
          fi
          echo "Site is live (HTTP $STATUS)"

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: echo "[$(date)] DEPLOY FAILED - commit ${{ github.sha }}" >> /var/log/crm-deploy-failures.log
