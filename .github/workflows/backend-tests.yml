name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "leadify-backend-main/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "leadify-backend-main/**"

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: leadify-backend-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: leadify-backend-main/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx jest --runInBand --forceExit
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: leadify-backend-main/coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: leadify-backend-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: leadify-backend-main/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]

    defaults:
      run:
        working-directory: leadify-backend-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: leadify-backend-main/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
