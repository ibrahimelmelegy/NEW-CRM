name: PR Check
on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Backend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-backend-main/node_modules
          key: backend-${{ hashFiles('leadify-backend-main/package-lock.json') }}

      - name: Cache Frontend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-frontend-main/node_modules
          key: frontend-${{ hashFiles('leadify-frontend-main/package-lock.json') }}

      - name: Install Backend
        run: cd leadify-backend-main && npm ci

      - name: Install Frontend
        run: cd leadify-frontend-main && npm ci --legacy-peer-deps

      - name: Prepare Nuxt
        run: cd leadify-frontend-main && npx nuxi prepare

      - name: Lint
        run: |
          cd leadify-backend-main && npx eslint src/ --quiet || true
          cd ../leadify-frontend-main && npx eslint --quiet . || true
        continue-on-error: true

      - name: Type Check Backend
        run: cd leadify-backend-main && npx tsc -p tsconfig.build.json --noEmit
        continue-on-error: true

      - name: Backend Tests
        run: cd leadify-backend-main && npx jest --ci --forceExit --passWithNoTests
        env:
          NODE_ENV: test
          SECRET_KEY: ci-test-secret-key-not-for-production-use-only-must-be-sixty-four-characters-long
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          TWO_FACTOR_ENCRYPTION_KEY: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789

      - name: Frontend Tests
        run: cd leadify-frontend-main && npx vitest run --passWithNoTests
