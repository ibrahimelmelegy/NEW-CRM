name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            leadify-frontend-main/package-lock.json
            leadify-backend-main/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: leadify-frontend-main

      - name: Install backend dependencies
        run: npm ci
        working-directory: leadify-backend-main

      - name: Lint frontend
        run: npm run lint
        working-directory: leadify-frontend-main

      - name: Lint backend
        run: npm run lint
        working-directory: leadify-backend-main

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: leadify-backend-main/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: leadify-backend-main

      - name: Run tests
        run: npm test -- --ci --forceExit
        working-directory: leadify-backend-main
        env:
          NODE_ENV: test
          SECRET_KEY: ci-test-secret-key-not-for-production
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASS: test
          DB_NAME: crm_test

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: leadify-frontend-main/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: leadify-frontend-main

      - name: Run tests
        run: npm test -- --run
        working-directory: leadify-frontend-main

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            leadify-frontend-main/package-lock.json
            leadify-backend-main/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: leadify-backend-main

      - name: Build backend
        run: npm run build
        working-directory: leadify-backend-main

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: leadify-frontend-main

      - name: Build frontend
        run: npm run build
        working-directory: leadify-frontend-main
        env:
          NUXT_PUBLIC_API_BASE_URL: /api/

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 10m
          script: /opt/crm/redeploy.sh

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://crm.hp-tech.com)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site returned HTTP $STATUS after deploy"
            exit 1
          fi
          echo "Site is live (HTTP $STATUS)"

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: echo "[$(date)] DEPLOY FAILED - commit ${{ github.sha }}" >> /var/log/crm-deploy-failures.log
