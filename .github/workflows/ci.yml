name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            leadify-frontend-main/package-lock.json
            leadify-backend-main/package-lock.json

      - name: Cache Frontend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-frontend-main/node_modules
          key: frontend-${{ hashFiles('leadify-frontend-main/package-lock.json') }}
          restore-keys: frontend-

      - name: Cache Backend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-backend-main/node_modules
          key: backend-${{ hashFiles('leadify-backend-main/package-lock.json') }}
          restore-keys: backend-

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: leadify-frontend-main

      - name: Prepare Nuxt (generates .nuxt/tsconfig.json)
        run: npx nuxi prepare
        working-directory: leadify-frontend-main

      - name: Install backend dependencies
        run: npm ci
        working-directory: leadify-backend-main

      - name: Lint frontend
        run: npm run lint
        working-directory: leadify-frontend-main

      - name: Lint backend
        run: npm run lint
        working-directory: leadify-backend-main
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpass123
          POSTGRES_DB: crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: leadify-backend-main/package-lock.json

      - name: Cache Backend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-backend-main/node_modules
          key: backend-${{ hashFiles('leadify-backend-main/package-lock.json') }}
          restore-keys: backend-

      - name: Install dependencies
        run: npm ci
        working-directory: leadify-backend-main

      - name: Backend Tests
        run: npx jest --ci --forceExit --passWithNoTests
        working-directory: leadify-backend-main
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NODE_ENV: test
          SECRET_KEY: ci-test-secret-key-not-for-production-use-only-must-be-sixty-four-characters-long
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          TWO_FACTOR_ENCRYPTION_KEY: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: testpass123
          DB_NAME: crm_test

      - name: Backend Type Check
        run: npx tsc -p tsconfig.build.json --noEmit
        working-directory: leadify-backend-main

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: leadify-frontend-main/package-lock.json

      - name: Cache Frontend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-frontend-main/node_modules
          key: frontend-${{ hashFiles('leadify-frontend-main/package-lock.json') }}
          restore-keys: frontend-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: leadify-frontend-main

      - name: Prepare Nuxt (generates .nuxt/tsconfig.json)
        run: npx nuxi prepare
        working-directory: leadify-frontend-main

      - name: Frontend Tests
        run: npx vitest run --passWithNoTests
        working-directory: leadify-frontend-main

      - name: Frontend Type Check
        run: npx nuxi typecheck
        working-directory: leadify-frontend-main
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            leadify-frontend-main/package-lock.json
            leadify-backend-main/package-lock.json

      - name: Cache Backend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-backend-main/node_modules
          key: backend-${{ hashFiles('leadify-backend-main/package-lock.json') }}
          restore-keys: backend-

      - name: Cache Frontend Dependencies
        uses: actions/cache@v4
        with:
          path: leadify-frontend-main/node_modules
          key: frontend-${{ hashFiles('leadify-frontend-main/package-lock.json') }}
          restore-keys: frontend-

      - name: Install backend dependencies
        run: npm ci
        working-directory: leadify-backend-main

      - name: Build backend
        run: npx tsc -p tsconfig.build.json
        working-directory: leadify-backend-main
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: leadify-frontend-main

      - name: Build frontend
        run: npm run build
        working-directory: leadify-frontend-main
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NUXT_PUBLIC_API_BASE_URL: /api/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Security Audit
        run: |
          cd leadify-backend-main && npm audit --production --audit-level=high || true
          cd ../leadify-frontend-main && npm audit --production --audit-level=high || true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 10m
          script: /opt/crm/redeploy.sh

      - name: Verify deployment
        run: |
          MAX_RETRIES=10
          RETRY_DELAY=20
          for i in $(seq 1 $MAX_RETRIES); do
            sleep $RETRY_DELAY
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://crm.hp-tech.com/api/health/ready)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in ${RETRY_DELAY}s..."
          done
          echo "::error::Site not healthy after $MAX_RETRIES attempts (last status: $STATUS)"
          exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            echo "[$(date)] DEPLOY FAILED - commit ${{ github.sha }} - attempting rollback" >> /var/log/crm-deploy-failures.log
            if [ -f /opt/crm/rollback.sh ]; then
              /opt/crm/rollback.sh
            fi
