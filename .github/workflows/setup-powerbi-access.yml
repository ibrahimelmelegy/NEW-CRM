name: Setup Power BI Database Access

on:
  workflow_dispatch:

jobs:
  setup-powerbi:
    name: Open port 5432 and create powerbi_user
    runs-on: ubuntu-latest
    steps:
      - name: Configure PostgreSQL access for Power BI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            echo "=========================================="
            echo "  Power BI Access Setup"
            echo "=========================================="

            # 1. Open port 5432 in UFW
            echo ""
            echo "[1/3] Opening port 5432 in UFW firewall..."
            ufw allow 5432/tcp comment "PostgreSQL - Power BI access"
            ufw status | grep 5432
            echo "  ✓ Port 5432 opened"

            # 2. Create powerbi_user in running PostgreSQL container
            echo ""
            echo "[2/3] Creating powerbi_user in PostgreSQL..."
            docker compose -f /opt/crm/docker-compose.prod.yml exec -T db psql -U leadify -d leadify << 'SQLEOF'
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'powerbi_user') THEN
                CREATE USER powerbi_user WITH PASSWORD 'moac39bKyhZ5m2rkqqrh';
                RAISE NOTICE 'powerbi_user created';
              ELSE
                RAISE NOTICE 'powerbi_user already exists';
              END IF;
            END
            $$;

            GRANT CONNECT ON DATABASE leadify TO powerbi_user;
            GRANT USAGE ON SCHEMA public TO powerbi_user;
            GRANT SELECT ON ALL TABLES IN SCHEMA public TO powerbi_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO powerbi_user;
            SQLEOF
            echo "  ✓ powerbi_user ready"

            # 3. Verify connectivity
            echo ""
            echo "[3/3] Verifying..."
            echo "  PostgreSQL port listening:"
            ss -tlnp | grep 5432 || netstat -tlnp 2>/dev/null | grep 5432 || echo "  (check manually)"
            echo ""
            echo "  UFW status:"
            ufw status numbered | grep -E "5432|Status"
            echo ""
            echo "=========================================="
            echo "  Done! Power BI can now connect:"
            echo "  Host:     157.245.223.119"
            echo "  Port:     5432"
            echo "  Database: leadify"
            echo "  User:     powerbi_user"
            echo "  Password: moac39bKyhZ5m2rkqqrh"
            echo "=========================================="
