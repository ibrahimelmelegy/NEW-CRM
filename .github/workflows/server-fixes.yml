name: Server-Side Fixes (One-Time)

on:
  workflow_dispatch:

jobs:
  server-fixes:
    name: Apply Server Fixes
    runs-on: ubuntu-latest
    steps:
      - name: Fix rollback permissions + setup backups
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            echo "=========================================="
            echo "  HPT CRM Server-Side Fixes"
            echo "=========================================="

            cd /opt/crm

            # 1. Fix script permissions
            echo ""
            echo "[1/4] Fixing script permissions..."
            for f in rollback.sh redeploy.sh; do
              if [ -f "/opt/crm/$f" ]; then
                chmod +x "/opt/crm/$f"
                echo "  ✓ $f is now executable"
              else
                echo "  ⚠ $f not found"
              fi
            done

            # 2. Create backup script
            echo ""
            echo "[2/4] Setting up automated database backups..."
            mkdir -p /opt/crm/backups

            cat > /opt/crm/backup-db.sh << 'BKSCRIPT'
            #!/bin/bash
            BACKUP_DIR="/opt/crm/backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            FILENAME="backup_auto_${TIMESTAMP}.sql.gz"
            docker compose -f /opt/crm/docker-compose.prod.yml exec -T db \
              pg_dump -U leadify -d leadify --no-owner --no-acl | gzip > "${BACKUP_DIR}/${FILENAME}"
            if [ $? -eq 0 ]; then
              SIZE=$(du -h "${BACKUP_DIR}/${FILENAME}" | cut -f1)
              echo "[$(date)] Backup created: ${FILENAME} (${SIZE})"
              find "${BACKUP_DIR}" -name "backup_auto_*.sql.gz" -mtime +30 -delete
              echo "[$(date)] Old backups cleaned (30-day retention)"
            else
              echo "[$(date)] ERROR: Backup failed!" >&2
              exit 1
            fi
            BKSCRIPT
            chmod +x /opt/crm/backup-db.sh
            echo "  ✓ Backup script created"

            # 3. Schedule daily backup cron
            echo ""
            echo "[3/4] Scheduling daily backup cron (2 AM)..."
            (crontab -l 2>/dev/null | grep -v "backup-db.sh"; echo "0 2 * * * /opt/crm/backup-db.sh >> /var/log/crm-backups.log 2>&1") | crontab -
            echo "  ✓ Cron job set"

            # 4. Run first backup
            echo ""
            echo "[4/4] Running first backup now..."
            /opt/crm/backup-db.sh
            echo "  ✓ First backup complete"

            # Verify
            echo ""
            echo "=========================================="
            echo "  Verification"
            echo "=========================================="
            echo ""
            echo "Docker containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}" 2>/dev/null || true
            echo ""
            echo "Backups:"
            ls -lh /opt/crm/backups/ 2>/dev/null || echo "  None"
            echo ""
            echo "Cron jobs:"
            crontab -l 2>/dev/null | grep -v "^#" || echo "  None"
            echo ""
            echo "Disk:"
            df -h / | tail -1
            echo ""
            echo "=========================================="
            echo "  All server-side fixes applied!"
            echo "=========================================="
