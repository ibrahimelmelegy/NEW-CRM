version: '3'
services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env # Use the same .env file for both services
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-leadify}
    ports:
      - "5433:5432"
    volumes:
      - db_data_clean_v2:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes


  web:
    build:
      context: . #. means this docker-compose is inside the node api home directory, in this scenario, you can even abandon this option.
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env # Reference the .env file
    working_dir: /usr/src/app
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start

volumes:
  db_data_clean_v2:
